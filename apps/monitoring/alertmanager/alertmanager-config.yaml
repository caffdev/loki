# ABOUTME: AlertmanagerConfig CR for routing alerts to Slack and a catch-all receiver.
# ABOUTME: Defines receivers, routes by severity, and grouping/throttle settings.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager-routes
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: observability
    alertmanagerConfig: kube-prometheus-stack
spec:
  route:
    receiver: slack-default
    groupBy:
      - alertname
      - namespace
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    routes:
      - receiver: slack-critical
        matchers:
          - name: severity
            value: critical
            matchType: "="
        repeatInterval: 1h
      - receiver: slack-default
        matchers:
          - name: severity
            value: warning
            matchType: "="
        repeatInterval: 4h

  receivers:
    - name: slack-critical
      slackConfigs:
        - apiURL:
            name: alertmanager-slack-webhook
            key: critical-webhook-url
          channel: "#alerts-critical"
          sendResolved: true
          title: |
            [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
          text: |
            *Severity:* {{ .CommonLabels.severity }}
            *Namespace:* {{ .CommonLabels.namespace }}
            *Description:* {{ .CommonAnnotations.description }}

    - name: slack-default
      slackConfigs:
        - apiURL:
            name: alertmanager-slack-webhook
            key: default-webhook-url
          channel: "#alerts-warning"
          sendResolved: true
          title: |
            [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
          text: |
            *Severity:* {{ .CommonLabels.severity }}
            *Namespace:* {{ .CommonLabels.namespace }}
            *Description:* {{ .CommonAnnotations.description }}
---
# Placeholder secret for Slack webhook URLs.
# Encrypt with SOPS before committing real values.
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-slack-webhook
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: observability
type: Opaque
stringData:
  critical-webhook-url: "https://hooks.slack.com/services/REPLACE/WITH/REAL_WEBHOOK"
  default-webhook-url: "https://hooks.slack.com/services/REPLACE/WITH/REAL_WEBHOOK"
