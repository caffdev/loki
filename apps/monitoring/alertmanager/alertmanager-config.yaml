# AlertmanagerConfig CR — SES SMTP receiver configuration
# Requires K8s secret 'alertmanager-smtp-secret' in monitoring namespace with keys:
#   username  — SES SMTP username (IAM-generated)
#   password  — SES SMTP password (IAM-generated)
#   to_address — recipient email address for alerts
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: ses-email-config
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  route:
    groupBy: ['alertname', 'namespace']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    receiver: 'ses-email'
    routes:
      - receiver: 'ses-email'
        matchers:
          - name: severity
            value: critical
            matchType: "="
        continue: false
  receivers:
    - name: 'ses-email'
      emailConfigs:
        - to: placeholder@example.com
          from: alertmanager@monitoring.internal
          smarthost: email-smtp.us-east-1.amazonaws.com:587
          authUsername:
            name: alertmanager-smtp-secret
            key: username
          authPassword:
            name: alertmanager-smtp-secret
            key: password
          requireTLS: true
          sendResolved: true
          headers:
            Subject: '{{ template "eks.subject" . }}'
          html: '{{ template "eks.html" . }}'
  inhibitRules:
    - sourceMatch:
        - name: severity
          value: critical
          matchType: "="
      targetMatch:
        - name: severity
          value: warning
          matchType: "="
      equal: ['alertname', 'namespace']