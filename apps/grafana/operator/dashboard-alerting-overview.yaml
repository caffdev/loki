# ABOUTME: GrafanaDashboard CR for the alerting overview dashboard.
# ABOUTME: Shows firing/pending alerts, notification stats, severity breakdown, and silences.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: alerting-overview
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: observability
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "annotations": { "list": [] },
      "editable": false,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "templating": { "list": [] },
      "panels": [
        {
          "title": "Active Alerts",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"firing\"})",
              "legendFormat": "Firing"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "title": "Pending Alerts",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"pending\"})",
              "legendFormat": "Pending"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "title": "Alertmanager Notifications/sec",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(alertmanager_notifications_total[5m]))",
              "legendFormat": "Notifications/s"
            }
          ]
        },
        {
          "title": "Notification Failures/sec",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(alertmanager_notifications_failed_total[5m]))",
              "legendFormat": "Failures/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 0.01 }
                ]
              }
            }
          }
        },
        {
          "title": "Firing Alerts by Severity",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count by (severity) (ALERTS{alertstate=\"firing\"})",
              "legendFormat": "{{ severity }}"
            }
          ]
        },
        {
          "title": "Firing Alerts Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count by (alertname) (ALERTS{alertstate=\"firing\"})",
              "legendFormat": "{{ alertname }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 10, "stacking": { "mode": "normal" } }
            }
          }
        },
        {
          "title": "Alerts Table",
          "type": "table",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "ALERTS{alertstate=\"firing\"}",
              "legendFormat": "",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true, "Value": true, "__name__": true },
                "renameByName": {
                  "alertname": "Alert",
                  "alertstate": "State",
                  "severity": "Severity",
                  "namespace": "Namespace",
                  "pod": "Pod",
                  "node": "Node"
                }
              }
            }
          ]
        },
        {
          "title": "Alertmanager Silences",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 22 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "alertmanager_silences{state=\"active\"}",
              "legendFormat": "Active Silences"
            }
          ]
        },
        {
          "title": "Alert Processing Duration",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 22 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(alertmanager_nflog_gc_duration_seconds_bucket[5m])))",
              "legendFormat": "p99 GC duration"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(alertmanager_notification_latency_seconds_bucket[5m])))",
              "legendFormat": "p99 notification latency"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["alerts", "alertmanager", "overview"],
      "time": { "from": "now-3h", "to": "now" },
      "title": "Alerting Overview",
      "uid": "alerting-overview"
    }
