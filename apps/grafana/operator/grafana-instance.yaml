# ABOUTME: Grafana CR that tells the Grafana Operator to deploy a Grafana instance.
# ABOUTME: Configures resource limits, persistence, and Karpenter node placement.
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: observability
    dashboards: grafana
spec:
  config:
    server:
      root_url: https://grafana.example.com
    auth.generic_oauth:
      enabled: "false"
    log:
      mode: console
      level: info
  deployment:
    spec:
      template:
        spec:
          nodeSelector:
            karpenter.sh/nodepool: monitoring
          containers:
            - name: grafana
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
