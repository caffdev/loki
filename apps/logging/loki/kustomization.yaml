# ABOUTME: Kustomize wrapper for the Loki Helm chart in Distributed (microservices) mode.
# ABOUTME: Deploys each Loki component independently with S3 storage and Memcached caching.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: logging

helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: "6.55.0"
    releaseName: loki
    namespace: logging
    valuesFile: values.yaml
