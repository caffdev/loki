# ABOUTME: Helm values for the Promtail DaemonSet.
# ABOUTME: Scrapes container logs, enriches with K8s metadata, and ships to loki gateway.
# ABOUTME: Promtail image routed through ECR pull-through cache.

# ---------------------------------------------------------------------------
# Image override — DockerHub → ECR pull-through cache
# ---------------------------------------------------------------------------
image:
  registry: <ECR_REGISTRY>
  repository: docker-hub/grafana/promtail

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

tolerations:
  - operator: Exists

nodeSelector:
  kubernetes.io/os: linux

config:
  # Push to the loki gateway
  clients:
    - url: http://loki-gateway.logging.svc.cluster.local/loki/api/v1/push

  snippets:
    scrapeConfigs: |
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - action: replace
            replacement: $1
            separator: /
            source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_pod_name
            target_label: job
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__

# Expose metrics for Prometheus scraping
serviceMonitor:
  enabled: true
  labels:
    prometheus: kube-prometheus-stack

# Host log mounts
extraVolumes:
  - name: pods
    hostPath:
      path: /var/log/pods
  - name: containers
    hostPath:
      path: /var/lib/docker/containers

extraVolumeMounts:
  - name: pods
    mountPath: /var/log/pods
    readOnly: true
  - name: containers
    mountPath: /var/lib/docker/containers
    readOnly: true
