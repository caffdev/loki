<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.25rem; }
    .subtitle { color: #64748b; font-size: 0.875rem; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 1.25rem; }
    .card h2 { font-size: 1rem; font-weight: 600; color: #f1f5f9; margin-bottom: 0.25rem; }
    .card p { font-size: 0.8125rem; color: #94a3b8; margin-bottom: 0.75rem; }
    .card .meta { font-size: 0.75rem; color: #475569; }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.6875rem; font-weight: 600; margin-bottom: 0.75rem; }
    .badge.pending { background: #1e3a5f; color: #60a5fa; }
    .badge.done { background: #14532d; color: #4ade80; }
    .badge.in-progress { background: #3b1f00; color: #fb923c; }
    a { color: #818cf8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .empty { grid-column: 1/-1; text-align: center; color: #475569; padding: 3rem; }
  </style>
</head>
<body>
  <h1>Mockup Gallery</h1>
  <p class="subtitle">Maintained by Pix · Source: <a href="features.md">features.md</a></p>
  <div class="grid" id="gallery">
    <div class="empty">No mockups yet. Add features to <code>features.md</code> and Pix will build them.</div>
  </div>
</body>
</html>
